name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: .NET Info
        run: dotnet --info

      - name: Restore NuGet packages
        run: dotnet restore DevToolkit/DevToolkit/DevToolkit.csproj

      - name: Build Blazor WebAssembly (Release)
        run: dotnet build DevToolkit/DevToolkit/DevToolkit.csproj -c Release --no-restore --verbosity normal

      - name: Publish Blazor WebAssembly(Release)
        run: |
          set -e
          dotnet publish DevToolkit/DevToolkit/DevToolkit.csproj -c Release --no-restore --no-build -o DevToolkit/DevToolkit/bin/Release/net10.0/publish --verbosity normal

      - name: List Publish Directory
        run: |
          echo "Listing contents of client publish directory:"
          ls -l DevToolkit/DevToolkit/bin/Release/net10.0/publish/wwwroot || echo "Client publish wwwroot directory not found"
          echo "Listing contents of client publish root:"
          ls -l DevToolkit/DevToolkit/bin/Release/net10.0/publish || echo "Client publish root directory not found"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_GROUND_01A71DB03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # Repo root so output_location is resolved from root
          api_location: "" # Api source code path - optional
          output_location: "DevToolkit/DevToolkit/bin/Release/net10.0/publish/wwwroot" # Pre-built WASM output
          skip_app_build: true # We pre-build above; skip Oryx auto-build
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_GROUND_01A71DB03 }}
          action: "close"
